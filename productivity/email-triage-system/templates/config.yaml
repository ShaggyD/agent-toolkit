# Email Janitor — Configuration
# Copy this to ~/.config/email-janitor/config.yaml and edit

# --- Gmail API ---
# Path to OAuth 2.0 token file (generated by initial auth flow)
credentials_path: ~/.google/gmail-token.json
# SCOPES used: https://www.googleapis.com/auth/gmail.modify

# --- Noise Database ---
# Path to noise-sender patterns file
noise_db_path: ~/.config/email-janitor/noise-senders.yaml

# --- Safe Senders ---
# Path to safe-sender allowlist file
safe_senders_path: ~/.config/email-janitor/safe-senders.yaml

# --- Logging ---
# Directory for JSONL log files (one per run)
log_dir: ~/.config/email-janitor/logs
# Log format: jsonl (default) or text
log_format: jsonl

# --- Labeling ---
# Whether to apply category labels before archiving.
# Labels are read dynamically from Gmail at startup.
apply_labels: true

# --- Behavior ---
# Maximum emails to process in one batch API call
batch_size: 50

# Rate limit: Gmail API allows 250 quota units per user per second
# One modify() call = 10 units. Keep requests below 25/sec.
rate_limit_rps: 5

# Whether dry-run is the default mode (safety for initial setup)
dry_run_default: false

# Whether security emails are logged only (not archived) — always true
log_security_only: true
